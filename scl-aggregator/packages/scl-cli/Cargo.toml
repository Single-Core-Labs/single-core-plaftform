[package]
name = "scl-cli"
version = "0.1.0"
edition = "2021"
description = "SCL CLI — The Single Core Labs Aggregator command-line interface"
license = "MIT"
repository = "https://github.com/Single-Core-Labs/scl-aggregator"

[[bin]]
name = "scl"
path = "src/main.rs"

[dependencies]
clap = { version = "4.5", features = ["derive", "cargo"] }
tokio = { version = "1.38", features = ["full"] }
reqwest = { version = "0.12", features = ["json", "stream"] }
indicatif = "0.17"
colored = "2.1"
crossterm = "0.28"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
toml = "0.8"
directories = "5.0"
anyhow = "1.0"
futures-util = "0.3"
console = "0.15"

[build-dependencies]
clap = { version = "4.5", features = ["derive", "cargo"] }
clap_complete = "4.5"

[profile.release]
opt-level = 3
strip = true
lto = true
codegen-units = 1
panic = "abort"
