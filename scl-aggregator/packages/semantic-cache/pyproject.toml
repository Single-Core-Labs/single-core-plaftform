[project]
name = "semantic-cache"
version = "0.1.0"
description = "Python library for semantic response caching using ChromaDB and Sentence Transformers"
dependencies = [
    "chromadb>=0.4.0",
    "sentence-transformers>=2.2.0",
    "pydantic>=2.0.0",
]

[project.optional-dependencies]
dev = [
    "pytest",
    "pytest-asyncio"
]

[tool.setuptools.packages.find]
where = ["src"]
